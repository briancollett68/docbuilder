<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT to Word Document Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lexend',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px}
h1{font-size:1.6rem;color:#93c5fd;margin-bottom:4px;text-align:center}
.subtitle{color:#64748b;font-size:.85rem;margin-bottom:20px;text-align:center}
.container{width:100%;max-width:800px;display:flex;flex-direction:column;gap:16px}
.top-bar{position:sticky;top:0;z-index:10;background:#0f172a;padding:12px 0 8px 0;display:flex;flex-direction:column;gap:12px;border-bottom:1px solid #1e293b}
label{font-size:.85rem;color:#94a3b8;font-weight:700}
#textInput{width:100%;min-height:340px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-family:'Lexend',sans-serif;font-size:.9rem;padding:14px;outline:none;transition:border .2s;overflow-y:auto;white-space:pre-wrap;word-wrap:break-word}
#textInput:focus{border-color:#3b82f6}
#textInput b,#textInput strong{color:#e2e8f0;font-weight:700}
.title-row{display:flex;gap:10px;align-items:center}
.title-row input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-family:'Lexend',sans-serif;font-size:.9rem;padding:10px 14px;outline:none;transition:border .2s}
.title-row input:focus{border-color:#3b82f6}
.char-count{font-size:.7rem;color:#64748b;white-space:nowrap}
button{padding:14px 28px;font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;width:100%}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-clear{background:#334155;color:#94a3b8;padding:14px 20px;font-family:'Lexend',sans-serif;font-size:.85rem;font-weight:700;border:none;border-radius:10px;cursor:pointer}
.btn-clear:hover{background:#475569}
.status{text-align:center;font-size:.85rem;min-height:1.2em}
.status.ok{color:#4ade80}
.status.err{color:#f87171}
.status.loading{color:#facc15}
.preview{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;font-size:.8rem;color:#94a3b8;max-height:200px;overflow-y:auto;line-height:1.5}
.title-preview{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px;text-align:center;font-size:.8rem;color:#60a5fa;line-height:1.6;display:none}
.title-preview span{color:#64748b;font-size:.7rem;display:block;margin-bottom:4px}
.input-hint{font-size:.7rem;color:#475569;margin-top:4px}
</style>
</head>
<body>
<h1>ChatGPT &#8594; Word Document</h1>
<p class="subtitle">Paste ChatGPT output or formatted text. <span style="color:#64748b;font-size:.8rem">BUILD 42</span></p>
<div class="container">
  <div class="top-bar">
    <div>
      <label>Document Title</label>
      <div class="title-row" style="margin-top:6px">
        <input type="text" id="titleInput" placeholder="Auto-filled on paste — edit anytime">
        <span class="char-count" id="charCount">0 chars</span>
      </div>
      <div class="title-preview" id="titlePreview"><span>Header preview:</span></div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-primary" id="buildBtn" style="flex:1" disabled>Generate .docx</button>
      <button class="btn-clear" id="clearBtn">Clear</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <div>
    <label>Paste Your Text</label>
    <div id="textInput" contenteditable="true"></div>
    <div class="input-hint">Supports ## headings, ### sub-headings, **bold**, - bullets, > block quotes, | tables, "quoted callouts"</div>
  </div>
  <div id="previewBox" class="preview" style="display:none"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
/* ================================================================
   ELEMENTS
   ================================================================ */
var textInput=document.getElementById('textInput');
var titleInput=document.getElementById('titleInput');
var buildBtn=document.getElementById('buildBtn');
var statusEl=document.getElementById('status');
var previewBox=document.getElementById('previewBox');
var charCount=document.getElementById('charCount');
var titlePreview=document.getElementById('titlePreview');
var debounce=null;

/* ================================================================
   EVENTS
   ================================================================ */
document.getElementById('clearBtn').addEventListener('click',function(){
  textInput.innerHTML='';titleInput.value='';charCount.textContent='0 chars';
  titlePreview.style.display='none';previewBox.style.display='none';
  statusEl.textContent='';statusEl.className='status';checkReady();titleInput.focus();
});

textInput.addEventListener('input',function(){
  checkReady();clearTimeout(debounce);
  debounce=setTimeout(function(){if(getText().trim())showPreview();else previewBox.style.display='none';},300);
});

textInput.addEventListener('paste',function(e){
  var clipText='';
  if(e.clipboardData)clipText=e.clipboardData.getData('text/plain')||'';
  setTimeout(function(){
    var t=getText().trim();
    if(t){showPreview();checkReady();
      if(!titleInput.value.trim()){
        var d=detectTitle(clipText||t);
        if(d){titleInput.value=d;charCount.textContent=d.length+' chars';updateTitlePreview();checkReady();}
      }
      titleInput.scrollIntoView({behavior:'smooth',block:'start'});
    }
  },200);
});

titleInput.addEventListener('input',function(){
  checkReady();charCount.textContent=titleInput.value.length+' chars';updateTitlePreview();
});

buildBtn.addEventListener('click',generate);

/* ================================================================
   HELPERS
   ================================================================ */
function getText(){return textInput.innerText||textInput.textContent||'';}
function checkReady(){buildBtn.disabled=!(getText().trim()&&titleInput.value.trim());}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function xmlEsc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function cleanTitle(t){return t.replace(/^#{1,6}\s*/,'').replace(/\*\*/g,'').replace(/[*_`]/g,'').trim();}

function detectTitle(text){
  var lines=text.split(/\n/);
  for(var i=0;i<lines.length;i++){var tr=lines[i].trim();if(tr)return cleanTitle(tr);}
  return '';
}

function updateTitlePreview(){
  var v=titleInput.value.trim();
  if(v){var lines=splitTitle(cleanTitle(v));var h='<span>Header preview:</span>';
    for(var i=0;i<lines.length;i++)h+='<div>'+esc(lines[i])+'</div>';
    titlePreview.innerHTML=h;titlePreview.style.display='block';
  }else titlePreview.style.display='none';
}

function generate(){
  statusEl.className='status loading';statusEl.textContent='Building\u2026';
  try{
    var title=cleanTitle(titleInput.value.trim()),text=getText().trim();
    if(!title||!text){statusEl.className='status err';statusEl.textContent='Enter both title and text.';return;}
    var blocks;
    try{blocks=getBlocks();}catch(e){console.error('Parse error:',e);blocks=fallbackParse(text);}
    if(!blocks||!blocks.length)blocks=fallbackParse(text);
    if(!blocks||!blocks.length){statusEl.className='status err';statusEl.textContent='No content found.';return;}
    buildDocx(title,blocks).then(function(blob){
      var fn=title.replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_').substring(0,50)+'.docx';
      var a=document.createElement('a'),url=URL.createObjectURL(blob);
      a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(function(){URL.revokeObjectURL(url);},5000);
      statusEl.className='status ok';statusEl.textContent='\u2713 '+fn;
    }).catch(function(e){statusEl.className='status err';statusEl.textContent='Build error: '+e.message;console.error(e);});
  }catch(e){statusEl.className='status err';statusEl.textContent='Error: '+e.message;console.error(e);}
}

function fallbackParse(text){
  var lines=text.split(/\n/),blocks=[];
  for(var i=0;i<lines.length;i++){var tr=lines[i].trim();if(tr)blocks.push({type:'body',text:tr,runs:[{t:tr,b:false}]});}
  return blocks;
}

/* ================================================================
   CONTENT ROUTING
   ================================================================ */
function getBlocks(){
  var html=textInput.innerHTML,text=getText();
  var hasMd=/\*\*[^*]+\*\*/.test(text)||/^#{1,6}\s/m.test(text);
  if(hasMd)return parseMarkdown(text);
  var hasRich=/<(b|strong|h[1-6])[^>]*>/i.test(html);
  if(hasRich){var b=parseRichHTML(html);if(b&&b.length)return b;}
  return parseMarkdown(text);
}

/* ================================================================
   TITLE SPLITTING
   ================================================================ */
var KWN=['for','the','a','an','and','or','of','in','on','at','to','by','with','from','as','is','its','not','but','nor','per','via'];
var MOS=['january','february','march','april','may','june','july','august','september','october','november','december','jan','feb','mar','apr','jun','jul','aug','sep','oct','nov','dec'];
var PER=['q1','q2','q3','q4','fy','cy','ytd','mtd','h1','h2'];
var DPR=['as','of','dated','updated','revised','effective','through','ending','for'];
function isMo(w){return MOS.indexOf(w.toLowerCase())!==-1;}
function isPe(w){return PER.indexOf(w.toLowerCase())!==-1;}
function isYr(w){return/^[''\u2018\u2019]?\d{2,4}$/.test(w);}
function isPa(w){return/^\(.*\)$/.test(w);}
function splitTitle(t){
  t=t.trim();
  var sep=t.match(/^(.+?)\s*[\u2014\u2013|]\s*(.+)$/);
  if(sep&&sep[1].trim()&&sep[2].trim())return splitTitle(sep[1].trim()).concat(splitTitle(sep[2].trim()));
  var col=t.match(/^(.{8,}?)\s*:\s*(.{4,})$/);
  if(col&&col[1].trim()&&col[2].trim())return splitTitle(col[1].trim()).concat(splitTitle(col[2].trim()));
  var w=t.split(/\s+/),ds=-1;
  for(var i=0;i<w.length;i++){if(isMo(w[i])||isPe(w[i])){ds=i;while(ds>0&&DPR.indexOf(w[ds-1].toLowerCase())!==-1)ds--;break;}if(isYr(w[i])&&i>0&&!isMo(w[i-1])){ds=i;while(ds>0&&DPR.indexOf(w[ds-1].toLowerCase())!==-1)ds--;break;}}
  if(ds>0){var bf=w.slice(0,ds).join(' '),dt=w.slice(ds).join(' ');if(bf&&dt){var ml=bf.length>40?splitTitle(bf):[bf];ml.push(dt);return ml;}}
  for(var i=1;i<w.length;i++){if(isPa(w[i])){var bf=w.slice(0,i).join(' '),pa=w.slice(i).join(' ');if(bf){var r=splitTitle(bf);var l=r[r.length-1];if((l+' '+pa).length<=40)r[r.length-1]=l+' '+pa;else r.push(pa);return r;}}}
  if(t.length<=40)return[t];
  var lines=[],cur='';
  for(var i=0;i<w.length;i++){var wd=w[i];if(cur&&(isMo(wd)||isPe(wd))){lines.push(cur);cur=wd;continue;}if(cur&&isYr(wd)){var p=cur.split(/\s+/);if(isMo(p[p.length-1])||isPe(p[p.length-1])){cur+=' '+wd;continue;}}var test=cur?cur+' '+wd:wd;if(test.length<=40){cur=test;}else{if(cur){var parts=cur.split(/\s+/);var lw=parts[parts.length-1].toLowerCase();if(parts.length>1&&KWN.indexOf(lw)!==-1){var mv=parts.pop();lines.push(parts.join(' '));cur=mv+' '+wd;}else{lines.push(cur);cur=wd;}}else cur=wd;}}
  if(cur)lines.push(cur);return lines;
}

/* ================================================================
   INLINE PARSING
   ================================================================ */
function cleanInline(s){return s.replace(/\*\*\*(.+?)\*\*\*/g,'$1').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*(.+?)\*/g,'$1').replace(/__(.+?)__/g,'$1').replace(/_(.+?)_/g,'$1').replace(/`(.+?)`/g,'$1').replace(/```/g,'').trim();}
function parseRuns(s){
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'**$1**');
  var runs=[],re=/\*\*(.+?)\*\*/g,last=0,m;
  while((m=re.exec(s))!==null){if(m.index>last){var b=s.substring(last,m.index).replace(/[*_`]/g,'');if(b)runs.push({t:b,b:false});}runs.push({t:m[1],b:true});last=re.lastIndex;}
  if(last<s.length){var r=s.substring(last).replace(/[*_`]/g,'');if(r)runs.push({t:r,b:false});}
  if(!runs.length)runs.push({t:cleanInline(s),b:false});return runs;
}

/* ================================================================
   DETECTION HELPERS
   ================================================================ */
function isDivider(t){t=t.trim();return t.length>=3&&/^[\u2500-\u257F\u2014\u2015\u2012\u2013\u2E3A\u2E3B—–\-_=*]{3,}$/.test(t);}
function isQuoted(t){t=t.trim();var a=t.charAt(0),z=t.charAt(t.length-1);return(a==='"'&&z==='"')||(a==='\u201C'&&(z==='\u201D'||z==='"'))||(a==='"'&&z==='\u201D');}
function isAllBold(t){return/^\*\*[^*]+\*\*$/.test(t.trim());}
var NOTE_WORDS=['materials','deck','source','current','formal','risk disclosure','takeaways','supports','describe','reference doc','from the'];
function looksLikeNote(t){var l=t.toLowerCase();if(l.length<60)return false;var c=0;for(var i=0;i<NOTE_WORDS.length;i++)if(l.indexOf(NOTE_WORDS[i])!==-1)c++;return c>=2;}

/* ================================================================
   MARKDOWN PARSER
   ================================================================ */
function parseMarkdown(raw){
  var t=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n{3,}/g,'\n\n');
  var lines=t.split('\n'),blocks=[],i=0;
  while(i<lines.length){
    var tr=lines[i].trim();
    if(!tr){i++;continue;}
    if(isDivider(tr)){i++;continue;}

    /* > Block quote */
    var bq=tr.match(/^>\s*(.*)/);
    if(bq){var qt=bq[1].trim();i++;
      while(i<lines.length&&lines[i].trim()&&(lines[i].trim().charAt(0)==='>'||(!lines[i].trim().match(/^(#{1,6}\s|[-*\u2022]\s|\d+[.\)]\s|\*\*.+\*\*$|\|)/)&&lines[i].trim().charAt(0)!=='#'))){
        var cl=lines[i].trim();if(cl.charAt(0)==='>')cl=cl.substring(1).trim();qt+=' '+cl;i++;}
      qt=qt.replace(/^[\u201C\u201D"]+|[\u201C\u201D"]+$/g,'').trim();
      blocks.push({type:'sticky',text:cleanInline(qt),runs:[{t:cleanInline(qt),b:true}]});continue;}

    /* | Table */
    if(tr.charAt(0)==='|'||(tr.indexOf('|')>0&&tr.split('|').length>=3)){
      var hdr=null,rows=[];
      while(i<lines.length&&lines[i].trim()&&lines[i].trim().indexOf('|')!==-1){
        var row=lines[i].trim();
        if(!/^[\|\s\-:]+$/.test(row)){var cells=row.split('|').map(function(c){return c.trim();}).filter(function(c){return c;});if(cells.length){if(!hdr)hdr=cells;else rows.push(cells);}}i++;}
      if(hdr&&rows.length){for(var r=0;r<rows.length;r++){for(var c=0;c<hdr.length&&c<rows[r].length;c++)blocks.push({type:'tablepair',label:cleanInline(hdr[c]),value:cleanInline(rows[r][c])});if(r<rows.length-1)blocks.push({type:'tablegap'});}}
      continue;}

    /* # or ## → section */
    var h1m=tr.match(/^#{1,2}\s+(.*)/);
    if(h1m){var tx=cleanInline(h1m[1]);blocks.push({type:'section',text:tx,runs:[{t:tx,b:true}]});i++;continue;}

    /* ### → sub-section */
    var h3m=tr.match(/^#{3,6}\s+(.*)/);
    if(h3m){var tx=cleanInline(h3m[1]);blocks.push({type:'subsection',text:tx,runs:[{t:tx,b:true}]});i++;continue;}

    /* "Quoted" → sticky */
    if(isQuoted(tr)){var cl=tr.replace(/^[\u201C\u201D"*]+|[\u201C\u201D"*]+$/g,'').trim();blocks.push({type:'sticky',text:cleanInline(cl),runs:[{t:cleanInline(cl),b:true}]});i++;continue;}

    /* **Bold line** → key statement */
    if(isAllBold(tr)&&tr.length<200){var tx=cleanInline(tr);blocks.push({type:'key',text:tx,runs:[{t:tx,b:true}]});i++;continue;}

    /* Bullets */
    var buM=tr.match(/^[\t ]*[-*\u2022]\s+(.*)/);
    if(buM){blocks.push({type:'bullet',text:cleanInline(buM[1]),runs:parseRuns(buM[1])});i++;continue;}

    /* Numbered list */
    var nM=tr.match(/^[\t ]*\d+[.\)]\s+(.*)/);
    if(nM){blocks.push({type:'bullet',text:cleanInline(nM[1]),runs:parseRuns(nM[1])});i++;continue;}

    /* Body paragraph */
    var para=tr;i++;
    while(i<lines.length&&lines[i].trim()&&!isDivider(lines[i].trim())&&!isQuoted(lines[i].trim())
      &&!lines[i].trim().match(/^(#{1,6}\s|[\t ]*[-*\u2022]\s|[\t ]*\d+[.\)]\s|\*\*.+\*\*$|>\s|\|)/)){
      para+=' '+lines[i].trim();i++;}
    var cleaned=cleanInline(para),runs=parseRuns(para);
    if(looksLikeNote(cleaned))blocks.push({type:'note',text:cleaned,runs:[{t:cleaned,b:false}]});
    else blocks.push({type:'body',text:cleaned,runs:runs});
  }
  return postProcess(blocks);
}

/* ================================================================
   RICH HTML PARSER
   ================================================================ */
function parseRichHTML(html){
  var temp=document.createElement('div');temp.innerHTML=html;
  var blocks=[],ch=temp.childNodes;
  for(var i=0;i<ch.length;i++){
    var node=ch[i],tag=(node.tagName||'').toUpperCase();
    if(node.nodeType===3&&!node.textContent.trim())continue;
    if(tag==='H1'||tag==='H2'){blocks.push({type:'section',text:node.textContent.trim(),runs:[{t:node.textContent.trim(),b:true}]});continue;}
    if(tag==='H3'||tag==='H4'){blocks.push({type:'subsection',text:node.textContent.trim(),runs:[{t:node.textContent.trim(),b:true}]});continue;}
    if(tag==='BLOCKQUOTE'){var qt=node.textContent.trim().replace(/^[\u201C\u201D"]+|[\u201C\u201D"]+$/g,'').trim();blocks.push({type:'sticky',text:qt,runs:[{t:qt,b:true}]});continue;}
    if(tag==='UL'||tag==='OL'){var items=node.querySelectorAll('li');for(var j=0;j<items.length;j++)blocks.push({type:'bullet',text:items[j].textContent.trim(),runs:exR(items[j])});continue;}
    var runs=(node.nodeType===3)?[{t:node.textContent.trim(),b:false}]:exR(node);
    var full='';for(var k=0;k<runs.length;k++)full+=runs[k].t;full=full.trim();
    if(!full)continue;
    if(isDivider(full))continue;
    if(isQuoted(full)){var cl=full.replace(/^[\u201C\u201D"]+|[\u201C\u201D"]+$/g,'').trim();blocks.push({type:'sticky',text:cl,runs:[{t:cl,b:true}]});continue;}
    var allBold=true;for(var k=0;k<runs.length;k++){if(runs[k].t.trim()&&!runs[k].b){allBold=false;break;}}
    if(allBold&&full.length<200)blocks.push({type:'key',text:full,runs:runs});
    else if(looksLikeNote(full))blocks.push({type:'note',text:full,runs:[{t:full,b:false}]});
    else blocks.push({type:'body',text:full,runs:runs});
  }
  return postProcess(blocks);
}
function exR(el){var r=[];wN(el,false,r);var m=[];for(var i=0;i<r.length;i++){if(m.length&&m[m.length-1].b===r[i].b)m[m.length-1].t+=r[i].t;else m.push({t:r[i].t,b:r[i].b});}return m;}
function wN(n,bold,r){if(n.nodeType===3){if(n.textContent)r.push({t:n.textContent,b:bold});return;}var tag=(n.tagName||'').toUpperCase();var b=bold||tag==='B'||tag==='STRONG';if(!b&&n.style&&(n.style.fontWeight==='bold'||n.style.fontWeight==='700'))b=true;for(var i=0;i<n.childNodes.length;i++)wN(n.childNodes[i],b,r);}

/* ================================================================
   POST-PROCESSING
   ================================================================ */
function postProcess(blocks){
  if(!blocks||!blocks.length)return blocks||[];
  try{
    /* Strip footer artifacts */
    while(blocks.length){var l=blocks[blocks.length-1];if(l.type==='body'&&/^\s*\d{2}\/\d{2}\/\d{2}\s+\d+\s+of\s+\d+/.test(l.text))blocks.pop();else break;}
    /* Strip preamble */
    var fh=-1;for(var j=0;j<blocks.length;j++){if(blocks[j].type==='section'||blocks[j].type==='subsection'){fh=j;break;}}
    if(fh>0){var ok=true;for(var j=0;j<fh;j++){if(blocks[j].type!=='body'&&blocks[j].type!=='key'){ok=false;break;}if(blocks[j].text.length>120){ok=false;break;}}if(ok)blocks.splice(0,fh);}
    /* Duplicate bullets */
    var clean=[];
    for(var j=0;j<blocks.length;j++){var b=blocks[j];
      if(b.type==='bullet'&&j+1<blocks.length&&blocks[j+1].type==='bullet'){
        var tt=b.text.toLowerCase().replace(/[^a-z\s]/g,'');var nxt=[];
        for(var k=j+1;k<Math.min(j+8,blocks.length)&&blocks[k].type==='bullet';k++)nxt.push(blocks[k].text.toLowerCase().replace(/[^a-z\s]/g,''));
        if(nxt.length>=2){var mc=0;for(var k=0;k<nxt.length;k++)if(tt.indexOf(nxt[k])!==-1)mc++;if(mc>=2)continue;}}
      clean.push(b);}
    blocks=clean;
    /* Slide refs → notes */
    for(var j=0;j<blocks.length;j++){if(blocks[j].type==='section'&&/^slides?\s+\d/i.test(blocks[j].text)){blocks[j].type='note';blocks[j].runs=[{t:blocks[j].text,b:false}];}}
    /* Long key → body */
    for(var j=0;j<blocks.length;j++){if(blocks[j].type==='key'&&blocks[j].text.length>200){blocks[j].type='body';blocks[j].runs=[{t:blocks[j].text,b:true}];}}
    /* Back-to-back headings → underline first */
    for(var j=0;j<blocks.length-1;j++){if(blocks[j].type==='section'){var nx=j+1;if(nx<blocks.length&&(blocks[nx].type==='section'||blocks[nx].type==='subsection'))blocks[j].underline=true;}}
    /* Extra spacing */
    var since=0;for(var j=0;j<blocks.length;j++){if(blocks[j].type==='section'){if(since>=5)blocks[j].extraSpace=true;since=0;}else since++;}
    /* Quick-ref cards */
    var CARD=['quick-reference','quick reference','cheat sheet','reference card','reference version','best lines','best 10 lines','lines to keep','memory hooks'];
    var inCard=false;
    for(var j=0;j<blocks.length;j++){if(blocks[j].type==='section'){var lt=blocks[j].text.toLowerCase();inCard=false;for(var k=0;k<CARD.length;k++)if(lt.indexOf(CARD[k])!==-1){inCard=true;break;}}if(inCard)blocks[j].card=true;}
    /* Remove duplicate title */
    var tv=cleanTitle(titleInput.value.trim()).toLowerCase();
    if(tv){for(var j=0;j<Math.min(3,blocks.length);j++){var b=blocks[j];if(!b.text)continue;var bt=b.text.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();var tt=tv.replace(/[^a-z0-9\s]/g,'').trim();if(bt&&tt&&(bt.indexOf(tt)!==-1||tt.indexOf(bt)!==-1)){blocks.splice(j,1);break;}}}
    return blocks;
  }catch(e){console.error('Post-process error:',e);return blocks||[];}
}

/* ================================================================
   PREVIEW
   ================================================================ */
function showPreview(){
  var blocks=getBlocks(),h='<b>Structure Preview:</b><br>';
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i],ul=b.underline?' style="text-decoration:underline"':'',bg=b.card?' background:#1e3a5f;padding:1px 4px;border-radius:2px;':'';
    if(b.type==='section')h+='<div style="color:#60a5fa;font-weight:700;font-size:.95rem;margin-top:6px;'+bg+'"'+ul+'>'+esc(b.text)+'</div>';
    else if(b.type==='subsection')h+='<div style="color:#6d9eeb;font-weight:700;font-size:.88rem;padding-left:6px;'+bg+'">'+esc(b.text)+'</div>';
    else if(b.type==='key')h+='<div style="color:#93c5fd;font-weight:700;'+bg+'">'+esc(b.text.substring(0,80))+(b.text.length>80?'\u2026':'')+'</div>';
    else if(b.type==='sticky')h+='<div style="color:#818cf8;font-weight:700;padding-left:8px;'+bg+'">\u275D '+esc(b.text.substring(0,70))+'</div>';
    else if(b.type==='note')h+='<div style="color:#64748b;font-size:.75rem;'+bg+'">'+esc(b.text.substring(0,80))+(b.text.length>80?'\u2026':'')+'</div>';
    else if(b.type==='tablepair')h+='<div style="font-size:.8rem;'+bg+'"><span style="color:#6d9eeb;font-weight:700">'+esc(b.label)+':</span> '+esc(b.value.substring(0,60))+'</div>';
    else if(b.type==='tablegap'){}
    else if(b.type==='bullet')h+='<div style="padding-left:16px;'+bg+'">\u2022 '+esc(b.text.substring(0,80))+(b.text.length>80?'\u2026':'')+'</div>';
    else h+='<div style="'+bg+'">'+esc(b.text.substring(0,90))+(b.text.length>90?'\u2026':'')+'</div>';
  }
  previewBox.innerHTML=h;previewBox.style.display='block';
}

/* ================================================================
   DOCX BUILDER
   ================================================================ */
var TI=1440,BLUE='204C8D',DKBLUE='1a3a6b',ACCENT='4472C4',GRAY='555555',
    MG=Math.round(TI*0.5),HD=Math.round(TI*0.2),FD=Math.round(TI*0.2);
function hp(p){return p*2;}
function tw(p){return p*20;}

function mkRun(text,sz,color,bold,underline){
  return'<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(sz)+'"/><w:szCs w:val="'+hp(sz)+'"/><w:color w:val="'+color+'"/>'+(bold?'<w:b/><w:bCs/>':'')+(underline?'<w:u w:val="single" w:color="'+color+'"/>':'')+'</w:rPr><w:t xml:space="preserve">'+xmlEsc(text)+'</w:t></w:r>';
}
function mkRuns(runs,sz,color){var x='';for(var i=0;i<runs.length;i++){var r=runs[i];x+=mkRun(r.t,sz,r.b?DKBLUE:color,r.b,false);}return x;}

function mkBody(blocks){
  var x='';
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i],sh=b.card?'<w:shd w:val="clear" w:color="auto" w:fill="E8EEF7"/>':'';
    if(b.type==='section'){
      var bf=i===0?'0':b.extraSpace?''+tw(16):''+tw(10);
      x+='<w:p><w:pPr><w:pStyle w:val="Heading1"/><w:spacing w:before="'+bf+'" w:after="'+tw(3)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRun(b.text,15,BLUE,true,b.underline||false)+'</w:p>';
    }else if(b.type==='subsection'){
      x+='<w:p><w:pPr><w:pStyle w:val="Heading2"/><w:spacing w:before="'+tw(7)+'" w:after="'+tw(2)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRun(b.text,13,ACCENT,true,false)+'</w:p>';
    }else if(b.type==='key'){
      x+='<w:p><w:pPr><w:spacing w:before="'+tw(2)+'" w:after="'+tw(2)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRun(b.text,13,DKBLUE,true,false)+'</w:p>';
    }else if(b.type==='sticky'){
      x+='<w:p><w:pPr><w:spacing w:before="'+tw(2)+'" w:after="'+tw(2)+'" w:line="240" w:lineRule="auto"/><w:ind w:left="288"/>'+sh+'</w:pPr>'+mkRun(b.text,12,ACCENT,true,false)+'</w:p>';
    }else if(b.type==='note'){
      x+='<w:p><w:pPr><w:spacing w:before="0" w:after="'+tw(3)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRun(b.text,11,GRAY,false,false)+'</w:p>';
    }else if(b.type==='tablepair'){
      x+='<w:p><w:pPr><w:spacing w:before="'+tw(1)+'" w:after="'+tw(1)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRun(b.label+':  ',11,ACCENT,true,false)+mkRun(b.value,11,DKBLUE,false,false)+'</w:p>';
    }else if(b.type==='tablegap'){
      x+='<w:p><w:pPr><w:spacing w:before="0" w:after="'+tw(3)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr></w:p>';
    }else if(b.type==='bullet'){
      x+='<w:p><w:pPr><w:pStyle w:val="ListBullet"/><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr><w:spacing w:before="0" w:after="'+tw(2)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRuns(b.runs,12,'000000')+'</w:p>';
    }else{
      x+='<w:p><w:pPr><w:spacing w:before="0" w:after="'+tw(3)+'" w:line="240" w:lineRule="auto"/>'+sh+'</w:pPr>'+mkRuns(b.runs,12,'000000')+'</w:p>';
    }
  }
  return x;
}

function mkHeader(title){
  var c=cleanTitle(title),lines=splitTitle(c);
  var x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:hdr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">';
  for(var i=0;i<lines.length;i++)x+='<w:p><w:pPr><w:jc w:val="center"/><w:spacing w:after="0" w:line="240" w:lineRule="auto"/></w:pPr>'+mkRun(lines[i],14,BLUE,false,false)+'</w:p>';
  x+='<w:p><w:pPr><w:spacing w:after="'+tw(4)+'" w:line="240" w:lineRule="auto"/><w:rPr><w:sz w:val="'+hp(1)+'"/></w:rPr></w:pPr></w:p></w:hdr>';
  return x;
}

function buildDocx(title,blocks){
  var z=new JSZip();
  z.file('[Content_Types].xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/><Override PartName="/word/header1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/><Override PartName="/word/footer1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.footer+xml"/><Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/></Types>');
  z.file('_rels/.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/></Relationships>');
  z.file('docProps/core.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><dc:title>'+xmlEsc(title)+'</dc:title><dcterms:created xsi:type="dcterms:W3CDTF">'+new Date().toISOString()+'</dcterms:created></cp:coreProperties>');
  z.file('word/_rels/document.xml.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/header" Target="header1.xml"/><Relationship Id="rId4" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/footer" Target="footer1.xml"/></Relationships>');
  z.file('word/styles.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(12)+'"/><w:szCs w:val="'+hp(12)+'"/><w:color w:val="000000"/></w:rPr></w:rPrDefault><w:pPrDefault><w:pPr><w:spacing w:before="0" w:after="'+tw(3)+'" w:line="240" w:lineRule="auto"/></w:pPr></w:pPrDefault></w:docDefaults><w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/></w:style><w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/><w:pPr><w:spacing w:before="'+tw(10)+'" w:after="'+tw(3)+'"/></w:pPr><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend"/><w:b/><w:bCs/><w:sz w:val="'+hp(15)+'"/><w:szCs w:val="'+hp(15)+'"/><w:color w:val="'+BLUE+'"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/><w:pPr><w:spacing w:before="'+tw(7)+'" w:after="'+tw(2)+'"/></w:pPr><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend"/><w:b/><w:bCs/><w:sz w:val="'+hp(13)+'"/><w:szCs w:val="'+hp(13)+'"/><w:color w:val="'+ACCENT+'"/></w:rPr></w:style><w:style w:type="paragraph" w:styleId="ListBullet"><w:name w:val="List Bullet"/><w:pPr><w:spacing w:before="0" w:after="'+tw(2)+'"/></w:pPr><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend"/><w:sz w:val="'+hp(12)+'"/><w:szCs w:val="'+hp(12)+'"/></w:rPr></w:style></w:styles>');
  z.file('word/numbering.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:abstractNum w:abstractNumId="0"><w:lvl w:ilvl="0"><w:start w:val="1"/><w:numFmt w:val="bullet"/><w:lvlText w:val="&#xF0B7;"/><w:lvlJc w:val="left"/><w:pPr><w:ind w:left="432" w:hanging="216"/></w:pPr><w:rPr><w:rFonts w:ascii="Symbol" w:hAnsi="Symbol" w:hint="default"/></w:rPr></w:lvl></w:abstractNum><w:num w:numId="1"><w:abstractNumId w:val="0"/></w:num></w:numbering>');
  z.file('word/header1.xml',mkHeader(title));
  var now=new Date(),ds=String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0')+'/'+String(now.getFullYear()).slice(-2);
  z.file('word/footer1.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:ftr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:p><w:pPr><w:tabs><w:tab w:val="right" w:pos="'+(12240-MG*2)+'"/></w:tabs></w:pPr>'+mkRun(ds,9,GRAY,false,false)+'<w:r><w:tab/></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:fldChar w:fldCharType="begin"/></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:instrText xml:space="preserve"> PAGE </w:instrText></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:fldChar w:fldCharType="end"/></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:t xml:space="preserve"> of </w:t></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:fldChar w:fldCharType="begin"/></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:instrText xml:space="preserve"> NUMPAGES </w:instrText></w:r><w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:sz w:val="'+hp(9)+'"/><w:szCs w:val="'+hp(9)+'"/><w:color w:val="'+GRAY+'"/></w:rPr><w:fldChar w:fldCharType="end"/></w:r></w:p></w:ftr>');
  var body=mkBody(blocks);
  z.file('word/document.xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><w:body>'+body+'<w:sectPr><w:headerReference w:type="default" r:id="rId3"/><w:footerReference w:type="default" r:id="rId4"/><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="'+MG+'" w:right="'+MG+'" w:bottom="'+MG+'" w:left="'+MG+'" w:header="'+HD+'" w:footer="'+FD+'"/></w:sectPr></w:body></w:document>');
  return z.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
}
