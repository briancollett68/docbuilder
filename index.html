<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatGPT to Word Document Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lexend', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px;
}

h1 { font-size: 1.6rem; color: #93c5fd; margin-bottom: 4px; text-align: center; }
.subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 20px; text-align: center; }
.container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 16px; }
label { font-size: 0.85rem; color: #94a3b8; font-weight: 700; }

#textInput {
  width: 100%;
  min-height: 340px;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  color: #e2e8f0;
  font-family: 'Lexend', sans-serif;
  font-size: 0.9rem;
  padding: 14px;
  resize: vertical;
  outline: none;
  transition: border 0.2s;
}
#textInput:focus { border-color: #3b82f6; }

.title-row { display: flex; gap: 10px; align-items: center; }

.title-row input {
  flex: 1;
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #e2e8f0;
  font-family: 'Lexend', sans-serif;
  font-size: 0.9rem;
  padding: 10px 14px;
  outline: none;
  transition: border 0.2s;
}
.title-row input:focus { border-color: #3b82f6; }

.char-count { font-size: 0.7rem; color: #64748b; white-space: nowrap; }
.source-badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  display: none;
}
.source-md { color: #3b82f6; background: #1e3a5f; }
.source-rich { color: #a78bfa; background: #2e1065; }

button {
  padding: 14px 28px;
  font-family: 'Lexend', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; width: 100%; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.status { text-align: center; font-size: 0.85rem; min-height: 1.2em; }
.status.ok { color: #4ade80; }
.status.err { color: #f87171; }
.status.loading { color: #facc15; }

.preview {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 14px;
  font-size: 0.8rem;
  color: #94a3b8;
  max-height: 200px;
  overflow-y: auto;
  line-height: 1.5;
}
.preview b { color: #93c5fd; }
.preview .h1 { color: #60a5fa; font-weight: 700; font-size: 0.95rem; margin-top: 6px; }
.preview .h2 { color: #60a5fa; font-weight: 700; font-size: 0.88rem; padding-left: 6px; }
.preview .bullet { padding-left: 20px; }
.preview .callout { padding-left: 16px; color: #818cf8; font-weight: 700; }
.preview .divider { color: #475569; font-size: 0.7rem; margin: 4px 0; }

.title-preview {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  font-size: 0.8rem;
  color: #60a5fa;
  line-height: 1.6;
  display: none;
}
.title-preview span { color: #64748b; font-size: 0.7rem; display: block; margin-bottom: 4px; }

.input-hint {
  font-size: 0.7rem;
  color: #475569;
  margin-top: 4px;
}
</style>
</head>
<body>

<h1>ChatGPT &#8594; Word Document</h1>
<p class="subtitle">Paste ChatGPT output or formatted text below. Bold formatting is preserved.</p>

<div class="container">

  <div>
    <label>Document Title (used in header — splits every 40 characters)</label>
    <div class="title-row" style="margin-top:6px">
      <input type="text" id="titleInput" placeholder="Type your document title here…">
      <span class="char-count" id="charCount">0 chars</span>
    </div>
    <div class="title-preview" id="titlePreview"><span>Header preview:</span></div>
  </div>

  <div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <label>Paste Your Text</label>
      <span class="source-badge source-md" id="mdBadge">Markdown detected</span>
      <span class="source-badge source-rich" id="richBadge">Rich formatting detected</span>
    </div>
    <textarea id="textInput" placeholder="Paste your ChatGPT output here…"></textarea>
    <div class="input-hint">Supports: ChatGPT markdown, rich text (Word, Docs, email). Quotes in "…" become blue bold callouts.</div>
  </div>

  <div id="previewBox" class="preview" style="display:none"></div>

  <button class="btn-primary" id="buildBtn" disabled>Generate .docx</button>
  <div class="status" id="status"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
/* ============================================================
   ELEMENT REFERENCES
   ============================================================ */
var textInput    = document.getElementById('textInput');
var titleInput   = document.getElementById('titleInput');
var buildBtn     = document.getElementById('buildBtn');
var statusEl     = document.getElementById('status');
var previewBox   = document.getElementById('previewBox');
var charCount    = document.getElementById('charCount');
var titlePreview = document.getElementById('titlePreview');
var mdBadge      = document.getElementById('mdBadge');
var richBadge    = document.getElementById('richBadge');

var debounceTimer = null;
var lastPastedHTML = '';

/* ============================================================
   EVENT LISTENERS
   ============================================================ */
textInput.addEventListener('input', function () {
  checkReady();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function () {
    var content = getContent();
    if (textInput.value.trim()) {
      parseAndPreview(content);
    } else {
      previewBox.style.display = 'none';
      mdBadge.style.display = 'none';
      richBadge.style.display = 'none';
    }
  }, 300);
});

textInput.addEventListener('paste', function (e) {
  if (e.clipboardData) {
    var html = e.clipboardData.getData('text/html');
    if (html) {
      lastPastedHTML = html;
    } else {
      lastPastedHTML = '';
    }
  }
  setTimeout(function () {
    var content = getContent();
    if (textInput.value.trim()) {
      parseAndPreview(content);
      checkReady();
    }
  }, 100);
});

titleInput.addEventListener('input', function () {
  checkReady();
  var val = titleInput.value;
  charCount.textContent = val.length + ' chars';
  if (val.trim()) {
    var lines = splitTitle(cleanTitle(val.trim()));
    var html = '<span>Header preview:</span>';
    for (var i = 0; i < lines.length; i++) {
      html += '<div>' + esc(lines[i]) + '</div>';
    }
    titlePreview.innerHTML = html;
    titlePreview.style.display = 'block';
  } else {
    titlePreview.style.display = 'none';
  }
});

buildBtn.addEventListener('click', function () {
  statusEl.className = 'status loading';
  statusEl.textContent = 'Building document\u2026';

  var title   = cleanTitle(titleInput.value.trim());
  var content = getContent();
  if (!content.text.trim() || !title) {
    statusEl.className = 'status err';
    statusEl.textContent = 'Error: Please enter both a title and text.';
    return;
  }

  var blocks = content.blocks;
  if (!blocks || blocks.length === 0) {
    statusEl.className = 'status err';
    statusEl.textContent = 'Error: Could not parse any content from the text.';
    return;
  }

  buildDocx(title, blocks).then(function (blob) {
    var fn = title.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_').substring(0, 50) + '.docx';
    var a   = document.createElement('a');
    var url = URL.createObjectURL(blob);
    a.href = url;
    a.download = fn;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 5000);

    statusEl.className = 'status ok';
    statusEl.textContent = '\u2713 Downloaded: ' + fn;
  }).catch(function (e) {
    statusEl.className = 'status err';
    statusEl.textContent = 'Error: ' + e.message;
    console.error(e);
  });
});

/* ============================================================
   HELPERS
   ============================================================ */
function checkReady() {
  var hasText  = textInput.value.trim().length > 0;
  var hasTitle = titleInput.value.trim().length > 0;
  buildBtn.disabled = !(hasText && hasTitle);
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function xmlEsc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function cleanTitle(t) {
  t = t.replace(/^#{1,6}\s*/, '');
  t = t.replace(/\*\*/g, '');
  t = t.replace(/[*_`]/g, '');
  return t.trim();
}

/* ============================================================
   SMART TITLE SPLITTING
   ============================================================ */
var KEEP_WITH_NEXT = ['for', 'the', 'a', 'an', 'and', 'or', 'of', 'in', 'on', 'at', 'to', 'by', 'with', 'from', 'as', 'is', 'its', 'not', 'but', 'nor', 'per', 'via'];

var MONTHS = ['january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december', 'jan', 'feb', 'mar', 'apr', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
var PERIOD_LABELS = ['q1', 'q2', 'q3', 'q4', 'fy', 'cy', 'ytd', 'mtd', 'h1', 'h2'];
var STATUS_WORDS = ['draft', 'final', 'revised', 'updated', 'version', 'confidential', 'internal', 'external', 'preliminary'];
var DATE_PREFACE = ['as', 'of', 'dated', 'updated', 'revised', 'effective', 'through', 'ending', 'for'];

function isMonthWord(word) { return MONTHS.indexOf(word.toLowerCase()) !== -1; }
function isPeriodLabel(word) { return PERIOD_LABELS.indexOf(word.toLowerCase()) !== -1; }
function isYear(word) { return /^[''\u2018\u2019]?\d{2,4}$/.test(word); }
function isDatePattern(word) { return /^\d{1,2}[\/\-]\d{2,4}$/.test(word) || /^\d{4}[\/\-]\d{1,2}$/.test(word); }
function isStatusWord(word) { return STATUS_WORDS.indexOf(word.toLowerCase().replace(/[()]/g, '')) !== -1; }
function isParenthetical(word) { return /^\(.*\)$/.test(word); }

function splitTitle(title) {
  var trimmed = title.trim();

  /* STEP 1: Split on explicit separators */
  var sepMatch = trimmed.match(/^(.+?)\s*[—–\|]\s*(.+)$/);
  if (sepMatch) {
    var left = sepMatch[1].trim();
    var right = sepMatch[2].trim();
    if (left && right) {
      var result = [];
      var leftLines = splitTitle(left);
      var rightLines = splitTitle(right);
      for (var i = 0; i < leftLines.length; i++) result.push(leftLines[i]);
      for (var i = 0; i < rightLines.length; i++) result.push(rightLines[i]);
      return result;
    }
  }

  var colonMatch = trimmed.match(/^(.{8,}?)\s*:\s*(.{4,})$/);
  if (colonMatch) {
    var cLeft = colonMatch[1].trim();
    var cRight = colonMatch[2].trim();
    if (cLeft && cRight) {
      var result = [];
      var cl = splitTitle(cLeft);
      var cr = splitTitle(cRight);
      for (var i = 0; i < cl.length; i++) result.push(cl[i]);
      for (var i = 0; i < cr.length; i++) result.push(cr[i]);
      return result;
    }
  }

  /* STEP 2: Find date groups and split before them — ALWAYS */
  var words = trimmed.split(/\s+/);

  var dateStart = -1;
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    if (isMonthWord(w) || isPeriodLabel(w) || isDatePattern(w)) {
      dateStart = i;
      while (dateStart > 0 && DATE_PREFACE.indexOf(words[dateStart - 1].toLowerCase()) !== -1) {
        dateStart--;
      }
      break;
    }
    if (isYear(w) && i > 0 && !isMonthWord(words[i - 1])) {
      dateStart = i;
      while (dateStart > 0 && DATE_PREFACE.indexOf(words[dateStart - 1].toLowerCase()) !== -1) {
        dateStart--;
      }
      break;
    }
  }

  if (dateStart > 0) {
    var beforeDate = words.slice(0, dateStart).join(' ');
    var dateGroup = words.slice(dateStart).join(' ');
    if (beforeDate.trim() && dateGroup.trim()) {
      var mainLines = (beforeDate.length > 40) ? splitTitle(beforeDate) : [beforeDate.trim()];
      mainLines.push(dateGroup.trim());
      return mainLines;
    }
  }

  /* STEP 3: Split before parentheticals */
  for (var i = 1; i < words.length; i++) {
    if (isParenthetical(words[i])) {
      var beforeParen = words.slice(0, i).join(' ');
      var parenGroup = words.slice(i).join(' ');
      if (beforeParen.trim()) {
        var result = splitTitle(beforeParen.trim());
        var lastLine = result[result.length - 1];
        if ((lastLine + ' ' + parenGroup).length <= 40) {
          result[result.length - 1] = lastLine + ' ' + parenGroup;
        } else {
          result.push(parenGroup.trim());
        }
        return result;
      }
    }
  }

  /* STEP 4: Under 40 chars — single line */
  if (trimmed.length <= 40) return [trimmed];

  /* STEP 5: Over 40 chars — word-boundary split */
  var lines = [];
  var current = '';

  for (var i = 0; i < words.length; i++) {
    var w = words[i];

    if (current && (isMonthWord(w) || isPeriodLabel(w) || isDatePattern(w))) {
      lines.push(current);
      current = w;
      continue;
    }

    if (current && isYear(w)) {
      var prevWords = current.split(/\s+/);
      var prevWord = prevWords[prevWords.length - 1];
      if (isMonthWord(prevWord) || isPeriodLabel(prevWord)) {
        current += ' ' + w;
        continue;
      }
    }

    var test = current ? current + ' ' + w : w;

    if (test.length <= 40) {
      current = test;
    } else {
      if (current) {
        var parts = current.split(/\s+/);
        var lastWord = parts[parts.length - 1].toLowerCase();
        if (parts.length > 1 && KEEP_WITH_NEXT.indexOf(lastWord) !== -1) {
          var moved = parts.pop();
          current = parts.join(' ');
          lines.push(current);
          current = moved + ' ' + w;
        } else {
          lines.push(current);
          current = w;
        }
      } else {
        current = w;
      }
    }
  }
  if (current) lines.push(current);
  return lines;
}

/* ============================================================
   CONTENT EXTRACTION
   ============================================================ */
function getContent() {
  var text = textInput.value || '';

  /* Always parse the plain text from the textarea using markdown parser.
     The textarea shows exactly what you pasted — that's the source of truth.
     Rich HTML from clipboard is only used if the plain text has NO markdown
     markers at all (meaning it came from Word/Docs/email, not ChatGPT). */
  var hasMarkdown = /\*\*[^*]+\*\*/.test(text) || /^#{1,6}\s/m.test(text) || /^[-*\u2022]\s/m.test(text) || /^\d+[.\)]\s/m.test(text);

  var blocks;

  if (hasMarkdown) {
    /* ChatGPT-style text — use markdown parser on the plain text */
    mdBadge.style.display = 'inline';
    richBadge.style.display = 'none';
    blocks = parseParagraphs(text);
  } else if (lastPastedHTML && /<(b|strong)[^>]*>/i.test(lastPastedHTML)) {
    /* No markdown found, but clipboard had bold HTML — try rich parser */
    mdBadge.style.display = 'none';
    richBadge.style.display = 'inline';
    blocks = parseRichHTML(lastPastedHTML);
    /* If rich parsing failed, fall back to plain text */
    if (!blocks || blocks.length === 0) {
      blocks = parseParagraphs(text);
      richBadge.style.display = 'none';
    }
  } else {
    /* Plain text, no markdown, no rich — just parse as plain */
    mdBadge.style.display = 'none';
    richBadge.style.display = 'none';
    blocks = parseParagraphs(text);
  }

  return { text: text, blocks: blocks };
}

/* ============================================================
   RICH HTML PARSER
   ============================================================ */
function parseRichHTML(html) {
  var temp = document.createElement('div');
  temp.innerHTML = html;
  var blocks = [];
  var children = temp.childNodes;

  for (var i = 0; i < children.length; i++) {
    var node = children[i];
    var tagName = (node.tagName || '').toUpperCase();

    if (node.nodeType === 3 && !node.textContent.trim()) continue;

    if (tagName === 'H1') {
      blocks.push({ type: 'h1', text: node.textContent.trim(), runs: [{ t: node.textContent.trim(), b: true }] });
      continue;
    }
    if (tagName === 'H2' || tagName === 'H3') {
      blocks.push({ type: 'h2', text: node.textContent.trim(), runs: [{ t: node.textContent.trim(), b: true }] });
      continue;
    }

    if (tagName === 'UL' || tagName === 'OL') {
      var items = node.querySelectorAll('li');
      for (var j = 0; j < items.length; j++) {
        var runs = extractRuns(items[j]);
        blocks.push({ type: 'bullet', text: items[j].textContent.trim(), runs: runs });
      }
      continue;
    }

    var el = (node.nodeType === 3) ? null : node;
    var runs;
    if (el) {
      runs = extractRuns(el);
    } else {
      var t = node.textContent.trim();
      if (!t) continue;
      runs = [{ t: t, b: false }];
    }

    var fullText = '';
    for (var k = 0; k < runs.length; k++) fullText += runs[k].t;
    fullText = fullText.trim();
    if (!fullText) continue;

    if (isDivider(fullText)) {
      blocks.push({ type: 'divider' });
      continue;
    }

    if (isQuotedLine(fullText)) {
      var cleaned = fullText.replace(/^[\u201C\u201D"]+|[\u201C\u201D"]+$/g, '').trim();
      blocks.push({ type: 'callout', text: cleaned, runs: [{ t: cleaned, b: true }] });
      continue;
    }

    var allBold = true;
    for (var k = 0; k < runs.length; k++) {
      if (runs[k].t.trim() && !runs[k].b) { allBold = false; break; }
    }

    if (allBold && fullText.length < 120) {
      blocks.push({ type: 'h2', text: fullText, runs: runs });
    } else {
      blocks.push({ type: 'body', text: fullText, runs: runs });
    }
  }

  return blocks;
}

function extractRuns(el) {
  var runs = [];
  walkNodes(el, false, runs);
  var merged = [];
  for (var i = 0; i < runs.length; i++) {
    if (merged.length > 0 && merged[merged.length - 1].b === runs[i].b) {
      merged[merged.length - 1].t += runs[i].t;
    } else {
      merged.push({ t: runs[i].t, b: runs[i].b });
    }
  }
  return merged;
}

function walkNodes(node, isBold, runs) {
  if (node.nodeType === 3) {
    var t = node.textContent;
    if (t) runs.push({ t: t, b: isBold });
    return;
  }
  var tag = (node.tagName || '').toUpperCase();
  var bold = isBold || tag === 'B' || tag === 'STRONG';
  if (!bold && node.style && (node.style.fontWeight === 'bold' || node.style.fontWeight === '700')) {
    bold = true;
  }
  var children = node.childNodes;
  for (var i = 0; i < children.length; i++) {
    walkNodes(children[i], bold, runs);
  }
}

/* ============================================================
   DETECTION HELPERS
   ============================================================ */
function isDivider(text) {
  var t = text.trim();
  if (t.length === 0) return false;
  if (/^[\u2500-\u257F\u2014\u2015\u2012\u2013\u2014\u2015—–\-_=*]{3,}$/.test(t)) return true;
  if (/^[-_=*]{3,}$/.test(t)) return true;
  return false;
}

function isQuotedLine(text) {
  var t = text.trim();
  if ((t.charAt(0) === '"' && t.charAt(t.length - 1) === '"') ||
      (t.charAt(0) === '\u201C' && t.charAt(t.length - 1) === '\u201D') ||
      (t.charAt(0) === '"' && t.charAt(t.length - 1) === '\u201D') ||
      (t.charAt(0) === '\u201C' && t.charAt(t.length - 1) === '"')) {
    return true;
  }
  return false;
}

/* ============================================================
   MARKDOWN PARSER
   ============================================================ */
function cleanInline(s) {
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '$1');
  s = s.replace(/\*\*(.+?)\*\*/g, '$1');
  s = s.replace(/\*(.+?)\*/g, '$1');
  s = s.replace(/__(.+?)__/g, '$1');
  s = s.replace(/_(.+?)_/g, '$1');
  s = s.replace(/`(.+?)`/g, '$1');
  s = s.replace(/```/g, '');
  return s.trim();
}

function parseInlineRuns(s) {
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '**$1**');
  var runs = [];
  var re = /\*\*(.+?)\*\*/g;
  var last = 0;
  var m;
  while ((m = re.exec(s)) !== null) {
    if (m.index > last) {
      var before = s.substring(last, m.index).replace(/[*_`]/g, '');
      if (before) runs.push({ t: before, b: false });
    }
    runs.push({ t: m[1], b: true });
    last = re.lastIndex;
  }
  if (last < s.length) {
    var rest = s.substring(last).replace(/[*_`]/g, '');
    if (rest) runs.push({ t: rest, b: false });
  }
  if (runs.length === 0) runs.push({ t: cleanInline(s), b: false });
  return runs;
}

function parseParagraphs(raw) {
  var t = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/\n{3,}/g, '\n\n');
  var lines = t.split('\n');
  var blocks = [];
  var i = 0;

  while (i < lines.length) {
    var tr = lines[i].trim();
    if (!tr) { i++; continue; }

    if (isDivider(tr)) {
      blocks.push({ type: 'divider' });
      i++; continue;
    }

    var hM = tr.match(/^(#{1,6})\s+(.*)/);
    if (hM) {
      var lv = hM[1].length;
      var tx = cleanInline(hM[2]);
      blocks.push({ type: lv <= 1 ? 'h1' : 'h2', text: tx, runs: [{ t: tx, b: true }] });
      i++; continue;
    }

    var bL = tr.match(/^\*\*(.+?)\*\*$/);
    if (bL && tr.length < 120) {
      var tx = cleanInline(bL[1]);
      blocks.push({ type: 'h2', text: tx, runs: [{ t: tx, b: true }] });
      i++; continue;
    }

    if (isQuotedLine(tr)) {
      var cleaned = tr.replace(/^[\u201C\u201D"*]+|[\u201C\u201D"*]+$/g, '').trim();
      blocks.push({ type: 'callout', text: cleaned, runs: [{ t: cleaned, b: true }] });
      i++; continue;
    }

    var buM = tr.match(/^[\t ]*[-*\u2022]\s+(.*)/);
    if (buM) {
      blocks.push({ type: 'bullet', text: cleanInline(buM[1]), runs: parseInlineRuns(buM[1]) });
      i++; continue;
    }

    var nM = tr.match(/^[\t ]*\d+[.\)]\s+(.*)/);
    if (nM) {
      blocks.push({ type: 'bullet', text: cleanInline(nM[1]), runs: parseInlineRuns(nM[1]) });
      i++; continue;
    }

    var para = tr;
    i++;
    while (i < lines.length && lines[i].trim() &&
           !isDivider(lines[i].trim()) &&
           !isQuotedLine(lines[i].trim()) &&
           !lines[i].trim().match(/^(#{1,6}\s|[\t ]*[-*\u2022]\s|[\t ]*\d+[.\)]\s|\*\*.+\*\*$)/)) {
      para += ' ' + lines[i].trim();
      i++;
    }
    blocks.push({ type: 'body', text: cleanInline(para), runs: parseInlineRuns(para) });
  }

  return blocks;
}

/* ============================================================
   PREVIEW
   ============================================================ */
function parseAndPreview(content) {
  var blocks = content.blocks;
  var html = '<b>Structure Preview:</b><br>';
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    if (b.type === 'h1') {
      html += '<div class="h1">H1: ' + esc(b.text) + '</div>';
    } else if (b.type === 'h2') {
      html += '<div class="h2">H2: ' + esc(b.text) + '</div>';
    } else if (b.type === 'divider') {
      html += '<div class="divider">\u2500\u2500\u2500 section break \u2500\u2500\u2500</div>';
    } else if (b.type === 'callout') {
      html += '<div class="callout">\u275D ' + esc(b.text) + '</div>';
    } else if (b.type === 'bullet') {
      html += '<div class="bullet">\u2022 ' + esc(b.text.substring(0, 80)) + (b.text.length > 80 ? '\u2026' : '') + '</div>';
    } else {
      html += '<div>' + esc(b.text.substring(0, 90)) + (b.text.length > 90 ? '\u2026' : '') + '</div>';
    }
  }
  previewBox.innerHTML = html;
  previewBox.style.display = 'block';
}

/* ============================================================
   DOCX BUILDER
   ============================================================ */
var TWIP_INCH = 1440;
var BLUE      = '204C8D';
var MARGIN    = Math.round(TWIP_INCH * 0.5);
var HDR_DIST  = Math.round(TWIP_INCH * 0.2);
var FTR_DIST  = Math.round(TWIP_INCH * 0.2);

function hp(pt) { return pt * 2; }
function tw(pt) { return pt * 20; }

function makeRuns(runs, sz, color) {
  var xml = '';
  for (var i = 0; i < runs.length; i++) {
    var r = runs[i];
    xml += '<w:r><w:rPr>'
      + '<w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
      + '<w:sz w:val="' + sz + '"/><w:szCs w:val="' + sz + '"/>'
      + '<w:color w:val="' + color + '"/>'
      + (r.b ? '<w:b/><w:bCs/>' : '')
      + '</w:rPr><w:t xml:space="preserve">' + xmlEsc(r.t) + '</w:t></w:r>';
  }
  return xml;
}

function makeBody(blocks) {
  var xml = '';
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];

    if (b.type === 'h1') {
      var beforeH1 = (i === 0) ? '0' : '' + tw(8);
      xml += '<w:p><w:pPr><w:pStyle w:val="Heading1"/>'
        + '<w:spacing w:before="' + beforeH1 + '" w:after="' + tw(2) + '" w:line="240" w:lineRule="auto"/>'
        + '</w:pPr>'
        + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
        + '<w:b/><w:bCs/><w:sz w:val="' + hp(14) + '"/><w:szCs w:val="' + hp(14) + '"/>'
        + '<w:color w:val="' + BLUE + '"/></w:rPr>'
        + '<w:t xml:space="preserve">' + xmlEsc(b.text) + '</w:t></w:r></w:p>';

    } else if (b.type === 'h2') {
      var beforeH2 = (i === 0) ? '0' : '' + tw(8);
      xml += '<w:p><w:pPr><w:pStyle w:val="Heading2"/>'
        + '<w:spacing w:before="' + beforeH2 + '" w:after="' + tw(2) + '" w:line="240" w:lineRule="auto"/>'
        + '</w:pPr>'
        + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
        + '<w:b/><w:bCs/><w:sz w:val="' + hp(13) + '"/><w:szCs w:val="' + hp(13) + '"/>'
        + '<w:color w:val="' + BLUE + '"/></w:rPr>'
        + '<w:t xml:space="preserve">' + xmlEsc(b.text) + '</w:t></w:r></w:p>';

    } else if (b.type === 'divider') {
      xml += '<w:p><w:pPr>'
        + '<w:spacing w:before="' + tw(6) + '" w:after="' + tw(6) + '" w:line="240" w:lineRule="auto"/>'
        + '<w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="' + BLUE + '"/></w:pBdr>'
        + '</w:pPr></w:p>';

    } else if (b.type === 'callout') {
      xml += '<w:p><w:pPr>'
        + '<w:spacing w:before="' + tw(4) + '" w:after="' + tw(4) + '" w:line="240" w:lineRule="auto"/>'
        + '<w:ind w:left="' + Math.round(TWIP_INCH * 0.4) + '"/>'
        + '</w:pPr>'
        + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
        + '<w:b/><w:bCs/><w:sz w:val="' + hp(13) + '"/><w:szCs w:val="' + hp(13) + '"/>'
        + '<w:color w:val="' + BLUE + '"/></w:rPr>'
        + '<w:t xml:space="preserve">' + xmlEsc(b.text) + '</w:t></w:r></w:p>';

    } else if (b.type === 'bullet') {
      var bRunsXml = makeRuns(b.runs, hp(13), '000000');
      xml += '<w:p><w:pPr><w:pStyle w:val="ListBullet"/>'
        + '<w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr>'
        + '<w:spacing w:before="0" w:after="' + tw(6) + '" w:line="240" w:lineRule="auto"/>'
        + '</w:pPr>' + bRunsXml + '</w:p>';

    } else {
      var pRunsXml = makeRuns(b.runs, hp(13), '000000');
      xml += '<w:p><w:pPr>'
        + '<w:spacing w:before="0" w:after="' + tw(6) + '" w:line="240" w:lineRule="auto"/>'
        + '</w:pPr>' + pRunsXml + '</w:p>';
    }
  }
  return xml;
}

function makeHeaderXml(title) {
  var clean = cleanTitle(title);
  var lines = splitTitle(clean);
  var xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<w:hdr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">';

  for (var i = 0; i < lines.length; i++) {
    xml += '<w:p><w:pPr><w:jc w:val="center"/>'
      + '<w:spacing w:after="0" w:line="240" w:lineRule="auto"/></w:pPr>'
      + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
      + '<w:sz w:val="' + hp(16) + '"/><w:szCs w:val="' + hp(16) + '"/>'
      + '<w:color w:val="' + BLUE + '"/></w:rPr>'
      + '<w:t xml:space="preserve">' + xmlEsc(lines[i]) + '</w:t></w:r></w:p>';
  }

  xml += '<w:p><w:pPr><w:spacing w:after="' + tw(6) + '" w:line="240" w:lineRule="auto"/>'
    + '<w:rPr><w:sz w:val="' + hp(1) + '"/><w:szCs w:val="' + hp(1) + '"/></w:rPr>'
    + '</w:pPr></w:p></w:hdr>';
  return xml;
}

function buildDocx(title, blocks) {
  var zip = new JSZip();

  zip.file('[Content_Types].xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
    + '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
    + '<Default Extension="xml" ContentType="application/xml"/>'
    + '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'
    + '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>'
    + '<Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/>'
    + '<Override PartName="/word/header1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/>'
    + '<Override PartName="/word/footer1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.footer+xml"/>'
    + '<Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>'
    + '</Types>'
  );

  zip.file('_rels/.rels',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>'
    + '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>'
    + '</Relationships>'
  );

  zip.file('docProps/core.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties"'
    + ' xmlns:dc="http://purl.org/dc/elements/1.1/"'
    + ' xmlns:dcterms="http://purl.org/dc/terms/"'
    + ' xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">'
    + '<dc:title>' + xmlEsc(title) + '</dc:title>'
    + '<dcterms:created xsi:type="dcterms:W3CDTF">' + new Date().toISOString() + '</dcterms:created>'
    + '</cp:coreProperties>'
  );

  zip.file('word/_rels/document.xml.rels',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>'
    + '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>'
    + '<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/header" Target="header1.xml"/>'
    + '<Relationship Id="rId4" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/footer" Target="footer1.xml"/>'
    + '</Relationships>'
  );

  zip.file('word/styles.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'
    + '<w:docDefaults>'
    + '<w:rPrDefault><w:rPr>'
    + '<w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(13) + '"/><w:szCs w:val="' + hp(13) + '"/>'
    + '<w:color w:val="000000"/>'
    + '</w:rPr></w:rPrDefault>'
    + '<w:pPrDefault><w:pPr>'
    + '<w:spacing w:before="0" w:after="' + tw(6) + '" w:line="240" w:lineRule="auto"/>'
    + '</w:pPr></w:pPrDefault>'
    + '</w:docDefaults>'
    + '<w:style w:type="paragraph" w:default="1" w:styleId="Normal"><w:name w:val="Normal"/></w:style>'
    + '<w:style w:type="paragraph" w:styleId="Heading1"><w:name w:val="heading 1"/>'
    + '<w:pPr><w:spacing w:before="' + tw(8) + '" w:after="' + tw(2) + '"/></w:pPr>'
    + '<w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:b/><w:bCs/>'
    + '<w:sz w:val="' + hp(14) + '"/><w:szCs w:val="' + hp(14) + '"/><w:color w:val="' + BLUE + '"/></w:rPr></w:style>'
    + '<w:style w:type="paragraph" w:styleId="Heading2"><w:name w:val="heading 2"/>'
    + '<w:pPr><w:spacing w:before="' + tw(8) + '" w:after="' + tw(2) + '"/></w:pPr>'
    + '<w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/><w:b/><w:bCs/>'
    + '<w:sz w:val="' + hp(13) + '"/><w:szCs w:val="' + hp(13) + '"/><w:color w:val="' + BLUE + '"/></w:rPr></w:style>'
    + '<w:style w:type="paragraph" w:styleId="ListBullet"><w:name w:val="List Bullet"/>'
    + '<w:pPr><w:spacing w:before="0" w:after="' + tw(6) + '"/></w:pPr>'
    + '<w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(13) + '"/><w:szCs w:val="' + hp(13) + '"/></w:rPr></w:style>'
    + '</w:styles>'
  );

  zip.file('word/numbering.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'
    + '<w:abstractNum w:abstractNumId="0"><w:lvl w:ilvl="0">'
    + '<w:start w:val="1"/><w:numFmt w:val="bullet"/>'
    + '<w:lvlText w:val="&#xF0B7;"/><w:lvlJc w:val="left"/>'
    + '<w:pPr><w:ind w:left="720" w:hanging="360"/></w:pPr>'
    + '<w:rPr><w:rFonts w:ascii="Symbol" w:hAnsi="Symbol" w:hint="default"/></w:rPr>'
    + '</w:lvl></w:abstractNum>'
    + '<w:num w:numId="1"><w:abstractNumId w:val="0"/></w:num>'
    + '</w:numbering>'
  );

  zip.file('word/header1.xml', makeHeaderXml(title));

  var now = new Date();
  var mm = String(now.getMonth() + 1).padStart(2, '0');
  var dd = String(now.getDate()).padStart(2, '0');
  var yy = String(now.getFullYear()).slice(-2);
  var dateStr = mm + '/' + dd + '/' + yy;

  zip.file('word/footer1.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<w:ftr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'
    + '<w:p><w:pPr>'
    + '<w:tabs><w:tab w:val="right" w:pos="' + (12240 - MARGIN * 2) + '"/></w:tabs>'
    + '</w:pPr>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:t xml:space="preserve">' + dateStr + '</w:t></w:r>'
    + '<w:r><w:tab/></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:fldChar w:fldCharType="begin"/></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:instrText xml:space="preserve"> PAGE </w:instrText></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:fldChar w:fldCharType="end"/></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:t xml:space="preserve"> of </w:t></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:fldChar w:fldCharType="begin"/></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:instrText xml:space="preserve"> NUMPAGES </w:instrText></w:r>'
    + '<w:r><w:rPr><w:rFonts w:ascii="Lexend" w:hAnsi="Lexend" w:cs="Lexend"/>'
    + '<w:sz w:val="' + hp(10) + '"/><w:szCs w:val="' + hp(10) + '"/></w:rPr>'
    + '<w:fldChar w:fldCharType="end"/></w:r>'
    + '</w:p></w:ftr>'
  );

  var bodyXml = makeBody(blocks);
  zip.file('word/document.xml',
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"'
    + ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">'
    + '<w:body>' + bodyXml
    + '<w:sectPr>'
    + '<w:headerReference w:type="default" r:id="rId3"/>'
    + '<w:footerReference w:type="default" r:id="rId4"/>'
    + '<w:pgSz w:w="12240" w:h="15840"/>'
    + '<w:pgMar w:top="' + MARGIN + '" w:right="' + MARGIN + '" w:bottom="' + MARGIN + '" w:left="' + MARGIN + '"'
    + ' w:header="' + HDR_DIST + '" w:footer="' + FTR_DIST + '"/>'
    + '</w:sectPr>'
    + '</w:body></w:document>'
  );

  return zip.generateAsync({
    type: 'blob',
    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
  });
}
